<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SmartDoc AI</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.snow.min.css" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F0EDE8; --surface: #FAFAF8; --surface2: #FFFFFF;
    --border: #E2DDD8; --border2: #CDC8C2;
    --text: #1A1714; --text2: #5A554F; --text3: #9A958F;
    --accent: #2B5CE6; --accent-light: #EEF2FF; --accent-hover: #1E4BD4;
    --success: #1B7A4E; --danger: #B84040; --warning: #C06820;
    --shadow-doc: 0 4px 24px rgba(0,0,0,0.12), 0 1px 4px rgba(0,0,0,0.08);
    --r: 8px; --r2: 12px;
    --font-ui: 'DM Sans', sans-serif;
    --font-display: 'DM Serif Display', serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  body { font-family: var(--font-ui); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.5; }

  .app-header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(250,250,248,0.95); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 52px;
  }
  .app-logo { display: flex; align-items: center; gap: 8px; }
  .app-logo-icon {
    width: 30px; height: 30px; background: var(--accent); border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 15px; font-weight: 700; font-family: var(--font-display);
  }
  .app-logo-name { font-family: var(--font-display); font-size: 18px; color: var(--text); letter-spacing: -0.3px; }
  .app-logo-name span { color: var(--accent); }
  .header-meta { font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 6px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #4caf50; display: inline-block; }

  .app-body { display: grid; grid-template-columns: 340px 1fr; gap: 0; height: calc(100vh - 52px); overflow: hidden; }

  .left-panel {
    background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow-y: auto; padding: 16px; gap: 14px;
  }
  .panel-section { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r2); overflow: hidden; }
  .panel-section-header {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 14px 8px; border-bottom: 1px solid var(--border);
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px;
    color: var(--text3); background: #FAFAF8;
  }
  .panel-section-body { padding: 12px; }

  textarea.raw-input {
    width: 100%; height: 160px; resize: vertical;
    border: 1px solid var(--border); border-radius: var(--r);
    padding: 10px 12px; font-family: var(--font-mono); font-size: 12px;
    color: var(--text); background: var(--bg); outline: none; line-height: 1.6;
    transition: border-color 0.15s;
  }
  textarea.raw-input:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 3px var(--accent-light); }
  textarea.raw-input::placeholder { color: var(--text3); }

  .btn-row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 7px 14px; border-radius: var(--r);
    font-family: var(--font-ui); font-size: 12.5px; font-weight: 500;
    cursor: pointer; border: none; outline: none; transition: all 0.15s; white-space: nowrap;
  }
  .btn:disabled { opacity: 0.55; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:not(:disabled):hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 3px 10px rgba(43,92,230,0.3); }
  .btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border2); }
  .btn-secondary:not(:disabled):hover { background: var(--border); }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:not(:disabled):hover { background: var(--bg); }
  .btn-success { background: var(--success); color: #fff; }
  .btn-success:not(:disabled):hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }

  .header-fields { display: flex; flex-direction: column; gap: 8px; }
  .field-group { display: flex; flex-direction: column; gap: 3px; }
  .field-label { font-size: 11px; font-weight: 500; color: var(--text3); letter-spacing: 0.3px; }
  .field-input {
    padding: 7px 10px; border-radius: 6px; border: 1px solid var(--border);
    font-family: var(--font-ui); font-size: 13px; color: var(--text); background: var(--bg); outline: none; transition: all 0.15s;
  }
  .field-input:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 2px var(--accent-light); }

  .cmd-row { display: flex; gap: 6px; }
  .cmd-input {
    flex: 1; padding: 8px 11px; border-radius: 7px; border: 1px solid var(--border);
    font-family: var(--font-ui); font-size: 12.5px; color: var(--text); background: var(--bg); outline: none; transition: all 0.15s;
  }
  .cmd-input:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 2px var(--accent-light); }
  .cmd-suggestions { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 5px; }
  .cmd-chip {
    padding: 3px 9px; border-radius: 20px; font-size: 11px; color: var(--accent);
    background: var(--accent-light); border: 1px solid #C8D8FF; cursor: pointer; transition: all 0.1s;
  }
  .cmd-chip:hover { background: #dce8ff; }

  .status-msg { padding: 8px 12px; border-radius: 7px; font-size: 12.5px; display: flex; align-items: center; gap: 7px; }
  .status-msg.loading { background: var(--accent-light); color: var(--accent); }
  .status-msg.error { background: #FFF0F0; color: var(--danger); border: 1px solid #F5C0C0; }
  .status-msg.ok { background: #F0FFF6; color: var(--success); }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 14px; height: 14px; border-radius: 50%; border: 2px solid currentColor; border-top-color: transparent; animation: spin 0.7s linear infinite; flex-shrink: 0; }

  .right-panel { display: flex; flex-direction: column; overflow: hidden; background: #E8E5E0; }
  .editor-toolbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 8px 16px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  }
  .toolbar-sep { width: 1px; height: 22px; background: var(--border2); margin: 0 4px; flex-shrink: 0; }
  .tb-select {
    padding: 4px 8px; border-radius: 5px; border: 1px solid var(--border);
    font-family: var(--font-ui); font-size: 12px; color: var(--text); background: var(--bg); cursor: pointer; outline: none;
  }
  .tb-btn {
    width: 28px; height: 28px; border-radius: 5px; border: 1px solid transparent;
    background: transparent; cursor: pointer; font-size: 13px; color: var(--text2);
    display: flex; align-items: center; justify-content: center; transition: all 0.12s; font-weight: 600;
  }
  .tb-btn:hover { background: var(--bg); border-color: var(--border); color: var(--text); }
  .toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

  .doc-scroll {
    flex: 1; overflow-y: auto; padding: 28px 0 40px;
    display: flex; flex-direction: column; align-items: center;
  }
  .doc-scroll::-webkit-scrollbar { width: 8px; }
  .doc-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  .a4-page {
    width: 794px; min-height: 1123px; background: #fff;
    box-shadow: var(--shadow-doc); border-radius: 2px;
    padding: 72px 80px 80px; position: relative; flex-shrink: 0;
  }
  .doc-academic-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding-bottom: 16px; border-bottom: 2px solid var(--accent); margin-bottom: 28px;
  }
  .doc-academic-header .institution { font-family: var(--font-display); font-size: 13px; color: var(--text); line-height: 1.4; max-width: 60%; }
  .doc-academic-header .student-info { text-align: right; font-size: 12px; color: var(--text2); line-height: 1.6; }
  .doc-academic-header .student-info .reg { font-family: var(--font-mono); font-size: 11px; color: var(--text3); }

  .ql-toolbar.ql-snow { display: none !important; }
  .ql-container.ql-snow { border: none !important; font-family: 'Georgia', serif; font-size: 14px; color: var(--text); }
  .ql-editor { padding: 0 !important; min-height: 400px; line-height: 1.8; }
  .ql-editor h1 { font-family: var(--font-display); font-size: 22px; margin: 20px 0 10px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
  .ql-editor h2 { font-family: var(--font-display); font-size: 17px; margin: 16px 0 8px; }
  .ql-editor p { margin: 0 0 10px; text-align: justify; }
  .ql-editor ul { margin: 0 0 10px 20px; }
  .ql-editor ul li { margin-bottom: 4px; }

  .page-number { position: absolute; bottom: 24px; left: 0; right: 0; text-align: center; font-size: 11px; color: var(--text3); font-family: var(--font-mono); }
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 0; color: var(--text3); text-align: center; gap: 10px; }
  .empty-state .icon { font-size: 40px; opacity: 0.4; }
  .empty-state p { font-size: 13px; max-width: 200px; line-height: 1.5; }

  @media (max-width: 1100px) {
    .app-body { grid-template-columns: 300px 1fr; }
    .a4-page { width: 680px; padding: 50px 60px; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const FONT_FAMILIES = [
  { label: 'Georgia (Serif)', value: 'Georgia, serif' },
  { label: 'Helvetica (Sans)', value: 'Helvetica, Arial, sans-serif' },
  { label: 'Palatino (Academic)', value: 'Palatino Linotype, serif' },
];
const FONT_SIZES = ['11px','12px','13px','14px','15px','16px','18px','20px','24px'];
const CMD_SUGGESTIONS = ['Make headings bigger','Convert to bullet points','Make it formal','Add an introduction','Summarize the content','Improve grammar'];

function App() {
  const [rawText, setRawText] = useState('');
  const [htmlContent, setHtmlContent] = useState('');
  const [command, setCommand] = useState('');
  const [status, setStatus] = useState(null);
  const [loading, setLoading] = useState(false);
  const [loadingAction, setLoadingAction] = useState('');
  const [studentName, setStudentName] = useState('');
  const [regNo, setRegNo] = useState('');
  const [college, setCollege] = useState('');
  const [fontFamily, setFontFamily] = useState(FONT_FAMILIES[0].value);
  const [fontSize, setFontSize] = useState('14px');
  const quillRef = useRef(null);
  const quillInstance = useRef(null);
  const docRef = useRef(null);

  useEffect(() => {
    if (quillRef.current && !quillInstance.current) {
      quillInstance.current = new Quill(quillRef.current, { theme: 'snow', modules: { toolbar: false } });
      quillInstance.current.on('text-change', () => {
        setHtmlContent(quillInstance.current.root.innerHTML);
      });
    }
  }, []);

  const setEditorContent = useCallback((html) => {
    setHtmlContent(html);
    if (quillInstance.current) quillInstance.current.root.innerHTML = html;
  }, []);

  useEffect(() => {
    if (quillRef.current) {
      quillRef.current.style.fontFamily = fontFamily;
      quillRef.current.style.fontSize = fontSize;
    }
  }, [fontFamily, fontSize]);

  const clean = (text) => text.replace(/```html?/gi, '').replace(/```/g, '').trim();

  // ✅ Calls our own /api/gemini endpoint — no API key in frontend
  async function callAI(prompt) {
    const res = await fetch('/api/gemini', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `Server error ${res.status}`);
    return data.result || '';
  }

  async function handleFormat() {
    if (!rawText.trim()) { setStatus({ type: 'error', msg: 'Please paste some text first.' }); return; }
    setLoading(true); setLoadingAction('Formatting'); setStatus(null);
    try {
      const prompt = `You are a document formatting AI.
Convert the given raw text into a clean academic document.
Rules:
- Headings → <h1>
- Subheadings → <h2>
- Paragraphs → <p>
- Bullet points → <ul><li>
- Keep proper spacing
- Do NOT add explanations
- Output ONLY valid HTML

Raw text:
${rawText}`;
      const result = await callAI(prompt);
      if (result) { setEditorContent(clean(result)); setStatus({ type: 'ok', msg: 'Document formatted successfully!' }); }
    } catch (e) { setStatus({ type: 'error', msg: e.message }); }
    finally { setLoading(false); setLoadingAction(''); }
  }

  async function handleAcademic() {
    if (!htmlContent || htmlContent === '<p><br></p>') { setStatus({ type: 'error', msg: 'Document is empty.' }); return; }
    setLoading(true); setLoadingAction('Styling'); setStatus(null);
    try {
      const prompt = `You are an academic document formatter.
Transform the following HTML into a properly structured academic style.
Rules:
- Keep clean HTML structure
- Do NOT add explanations
- Return only updated HTML

Current HTML:
${htmlContent}`;
      const result = await callAI(prompt);
      if (result) { setEditorContent(clean(result)); setStatus({ type: 'ok', msg: 'Academic style applied!' }); }
    } catch (e) { setStatus({ type: 'error', msg: e.message }); }
    finally { setLoading(false); setLoadingAction(''); }
  }

  async function handleCommand() {
    if (!command.trim()) return;
    if (!htmlContent || htmlContent === '<p><br></p>') { setStatus({ type: 'error', msg: 'Document is empty.' }); return; }
    setLoading(true); setLoadingAction('Applying command'); setStatus(null);
    try {
      const prompt = `You are an AI document editor.
Modify the document according to the user instruction.
Rules:
- Keep structure clean
- Do NOT explain anything
- Return only updated HTML

Current HTML:
${htmlContent}

User instruction: ${command}`;
      const result = await callAI(prompt);
      if (result) { setEditorContent(clean(result)); setStatus({ type: 'ok', msg: 'Command applied!' }); setCommand(''); }
    } catch (e) { setStatus({ type: 'error', msg: e.message }); }
    finally { setLoading(false); setLoadingAction(''); }
  }

  function handleClear() { setRawText(''); setEditorContent(''); setStatus(null); }

  function handleDownloadPDF() {
    if (!docRef.current) return;
    html2pdf().set({
      margin: 0, filename: `SmartDoc_${studentName || 'document'}.pdf`,
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2, useCORS: true, letterRendering: true },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
    }).from(docRef.current).save();
  }

  function applyBold() { const q = quillInstance.current; if (q && q.getSelection()) q.format('bold', true); }
  function applyItalic() { const q = quillInstance.current; if (q && q.getSelection()) q.format('italic', true); }
  function applyAlign(val) { const q = quillInstance.current; if (q && q.getSelection()) q.format('align', val); }

  const hasContent = htmlContent && htmlContent !== '<p><br></p>';

  return (
    <>
      <header className="app-header">
        <div className="app-logo">
          <div className="app-logo-icon">S</div>
          <span className="app-logo-name">Smart<span>Doc</span> AI</span>
        </div>
        <div className="header-meta">
          <span className="status-dot"></span>
          Academic Document Formatter &nbsp;·&nbsp; Powered by Gemini 1.5 Flash
        </div>
      </header>

      <div className="app-body">
        <aside className="left-panel">
          <div className="panel-section">
            <div className="panel-section-header"><span>📄</span> Raw Text Input</div>
            <div className="panel-section-body">
              <textarea className="raw-input" placeholder="Paste your raw or messy text here…&#10;&#10;SmartDoc AI will convert it into a clean, structured academic document." value={rawText} onChange={e => setRawText(e.target.value)} />
              <div className="btn-row">
                <button className="btn btn-primary" onClick={handleFormat} disabled={loading}>
                  {loading && loadingAction === 'Formatting' ? <><span className="spinner"></span> Formatting…</> : '✦ Format with AI'}
                </button>
                <button className="btn btn-ghost btn-sm" onClick={handleClear} disabled={loading}>Clear</button>
              </div>
            </div>
          </div>

          <div className="panel-section">
            <div className="panel-section-header"><span>🎓</span> Academic Header</div>
            <div className="panel-section-body">
              <div className="header-fields">
                <div className="field-group">
                  <label className="field-label">Student Name</label>
                  <input className="field-input" placeholder="e.g. Arjun Sharma" value={studentName} onChange={e => setStudentName(e.target.value)} />
                </div>
                <div className="field-group">
                  <label className="field-label">Register Number</label>
                  <input className="field-input" placeholder="e.g. 22CS001" value={regNo} onChange={e => setRegNo(e.target.value)} />
                </div>
                <div className="field-group">
                  <label className="field-label">College / Institution</label>
                  <input className="field-input" placeholder="e.g. Anna University" value={college} onChange={e => setCollege(e.target.value)} />
                </div>
              </div>
            </div>
          </div>

          <div className="panel-section">
            <div className="panel-section-header"><span>⚡</span> AI Command Agent</div>
            <div className="panel-section-body">
              <div className="cmd-row">
                <input className="cmd-input" placeholder="e.g. Make it more formal…" value={command} onChange={e => setCommand(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleCommand()} />
                <button className="btn btn-primary btn-sm" onClick={handleCommand} disabled={loading || !command.trim()}>
                  {loading && loadingAction === 'Applying command' ? <span className="spinner"></span> : '↵'}
                </button>
              </div>
              <div className="cmd-suggestions">
                {CMD_SUGGESTIONS.map(s => <span key={s} className="cmd-chip" onClick={() => setCommand(s)}>{s}</span>)}
              </div>
              <div className="btn-row" style={{marginTop:'10px'}}>
                <button className="btn btn-secondary btn-sm" onClick={handleAcademic} disabled={loading}>
                  {loading && loadingAction === 'Styling' ? <><span className="spinner"></span> Styling…</> : '🎓 Make Academic Style'}
                </button>
              </div>
            </div>
          </div>

          {status && (
            <div className={`status-msg ${status.type}`}>
              {status.type === 'error' && '⚠'}{status.type === 'ok' && '✓'}
              <span>{status.msg}</span>
            </div>
          )}
        </aside>

        <main className="right-panel">
          <div className="editor-toolbar">
            <select className="tb-select" value={fontFamily} onChange={e => setFontFamily(e.target.value)}>
              {FONT_FAMILIES.map(f => <option key={f.value} value={f.value}>{f.label}</option>)}
            </select>
            <select className="tb-select" value={fontSize} onChange={e => setFontSize(e.target.value)}>
              {FONT_SIZES.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
            <div className="toolbar-sep"></div>
            <button className="tb-btn" title="Bold" onClick={applyBold}><b>B</b></button>
            <button className="tb-btn" title="Italic" onClick={applyItalic}><i>I</i></button>
            <div className="toolbar-sep"></div>
            <button className="tb-btn" title="Align Left" onClick={() => applyAlign('')}>≡</button>
            <button className="tb-btn" title="Align Center" onClick={() => applyAlign('center')}>☰</button>
            <button className="tb-btn" title="Justify" onClick={() => applyAlign('justify')}>⊟</button>
            <div className="toolbar-right">
              <button className="btn btn-success btn-sm" onClick={handleDownloadPDF} disabled={!hasContent}>⬇ Download PDF</button>
            </div>
          </div>

          <div className="doc-scroll">
            <div className="a4-page" ref={docRef}>
              {(studentName || regNo || college) && (
                <div className="doc-academic-header">
                  <div className="institution">{college || 'Institution Name'}</div>
                  <div className="student-info">
                    <div style={{fontWeight:600}}>{studentName || 'Student Name'}</div>
                    {regNo && <div className="reg">{regNo}</div>}
                  </div>
                </div>
              )}
              <div className="quill-wrapper" style={{ fontFamily, fontSize }}>
                <div ref={quillRef}></div>
              </div>
              {!hasContent && (
                <div className="empty-state">
                  <div className="icon">📃</div>
                  <p>Paste your text on the left and click <strong>"Format with AI"</strong> to generate your document.</p>
                </div>
              )}
              <div className="page-number">— 1 —</div>
            </div>
          </div>
        </main>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
